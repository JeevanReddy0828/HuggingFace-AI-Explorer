services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hf_explorer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/hf_explorer
      CORS_ORIGINS: http://localhost:3000
      HF_TOKEN: ${HF_TOKEN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "5000:5000"
    command: >
      sh -c "flask --app wsgi:app db upgrade && gunicorn --bind 0.0.0.0:5000 --workers 2 --timeout 60 wsgi:app"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:5000
      NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ORG: ${SENTRY_ORG:-}
      SENTRY_PROJECT: ${SENTRY_PROJECT:-}
    ports:
      - "3000:3000"

volumes:
  pg_data:
